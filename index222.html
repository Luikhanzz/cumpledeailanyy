<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Alany</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

.contenedor{
    position:relative;
    width:100%;
    height:100%;
}

/* Imagen principal */
.imagen-principal{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Botón invisible */
.boton-invitacion{
    position:absolute;
    top:58%;
    left:50%;
    transform:translate(-50%, -50%);
    width:45%;
    height:12%;
    cursor:pointer;
}

/* Botón música */
.boton-musica{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff69b4;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:25px;
    cursor:pointer;
    font-size:14px;
    z-index:1000;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
}

.boton-musica:hover{
    background:#ff1493;
}

</style>
</head>

<body>

<div class="contenedor">

    <img src="foto1.png" alt="Invitación" class="imagen-principal">

    <a href="index222.html" class="boton-invitacion"></a>

</div>

<audio id="bg-music" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<button class="boton-musica" id="btn-musica">
    🎵 Música
</button>

<script>

const music = document.getElementById("bg-music");
const btnMusica = document.getElementById("btn-musica");

const tiempoGuardado = localStorage.getItem("musicTime");

if(tiempoGuardado){
    music.currentTime = parseFloat(tiempoGuardado);
}

document.addEventListener("click", () => {
    music.play().catch(() => {});
}, { once:true });

setInterval(() => {
    localStorage.setItem("musicTime", music.currentTime);
}, 1000);

btnMusica.addEventListener("click", () => {

    if(music.paused){
        music.play();
        btnMusica.textContent = "🔊 Música";
    }else{
        music.pause();
        btnMusica.textContent = "🎵 Música";
    }

});

</script>

</body>
</html>
</body>
</html>
